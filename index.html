<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCSP Ultimate Interactive Reviewer</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --sti-yellow: #facc15;
            --sti-blue: #38bdf8;
            --text: #f1f5f9;
            --correct: #10b981;
            --wrong: #ef4444;
        }

        body {
            font-family: 'Satoshi', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 800px; }
        h1 { color: var(--sti-yellow); text-align: center; margin-bottom: 10px; }
        .info { text-align: center; color: var(--sti-blue); margin-bottom: 30px; font-weight: 500; }

        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn {
            padding: 10px 20px;
            background: var(--card);
            border: 2px solid var(--sti-blue);
            color: var(--sti-blue);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 700;
        }
        .tab-btn.active { background: var(--sti-blue); color: var(--bg); }

        /* Flashcards Styling */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .front { background: var(--card); border: 3px solid var(--sti-yellow); }
        .back { background: var(--sti-blue); color: var(--bg); transform: rotateY(180deg); font-size: 1.1rem; font-weight: 500; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;}
        .btn-nav { background: var(--card); color: white; border: 1px solid #444; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: 700;}

        /* Quiz Styling */
        .quiz-area {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            min-height: 400px;
            position: relative;
            overflow: hidden;
            border-bottom: 6px solid var(--sti-blue);
        }
        .q-header { font-size: 0.9rem; color: var(--sti-blue); text-transform: uppercase; margin-bottom: 10px; }
        .q-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; }
        .options { display: grid; gap: 12px; }
        .opt {
            background: #2d3748;
            border: 2px solid #4a5568;
            color: white;
            padding: 18px;
            border-radius: 15px;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }
        .opt.correct { background: var(--correct) !important; animation: pop 0.4s ease; }
        .opt.wrong { background: var(--wrong) !important; animation: shake 0.4s ease; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .feedback-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 4rem; font-weight: 900; z-index: 10; opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .feedback-show { opacity: 1; transform: translate(-50%, -60%); }
    </style>
</head>
<body>

<div class="container">
    <h1>UCSP Master Reviewer</h1>
    <p class="info">Complete 60-Item Interactive Guide</p>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchSet(0)">Set A: Disciplines</button>
        <button class="tab-btn" onclick="switchSet(1)">Set B: Culture</button>
        <button class="tab-btn" onclick="switchSet(2)">Set C: Evolution</button>
    </div>

    <div class="card-container" onclick="document.getElementById('fcard').classList.toggle('is-flipped')">
        <div class="card" id="fcard">
            <div class="card-face front">
                <span id="set-label" style="color: var(--sti-yellow); font-size: 0.8rem;">SET A</span>
                <h2 id="term-text">Loading...</h2>
            </div>
            <div class="card-face back" id="def-text">Definition</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-nav" onclick="prevFlash()">← Previous</button>
        <span id="flash-count">1 / 20</span>
        <button class="btn-nav" onclick="nextFlash()">Next →</button>
    </div>

    <div class="quiz-area">
        <div id="quiz-content">
            <div class="q-header" id="q-counter">Question 1</div>
            <div class="q-text" id="q-text">Loading question...</div>
            <div class="options" id="options-box"></div>
        </div>
        <div id="feedback-icon" class="feedback-overlay"></div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(win) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(win ? 523 : 110, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    const allData = [
        {
            name: "SET A: Disciplines",
            items: [
                {q: "Anthropology", a: "The study of humankind in all times and all places."},
                {q: "Sociology", a: "The scientific study of social groups and human interactions."},
                {q: "Political Science", a: "The study of government, power, and political processes."},
                {q: "August Comte", a: "The Father of Sociology who coined the term in 1838."},
                {q: "Cultural Anthropology", a: "The study of living people and their cultural variations."},
                {q: "Archaeology", a: "The study of past cultures through material remains and artifacts."},
                {q: "Biological Anthropology", a: "The study of human origins, genetics, and adaptation."},
                {q: "Linguistic Anthropology", a: "The study of language and its influence on social life."},
                {q: "State", a: "A political concept consisting of people, territory, government, and sovereignty."},
                {q: "Nation", a: "An ethnic concept where people share a common language, race, or culture."},
                {q: "Sovereignty", a: "The supreme power or independence of a state from external control."},
                {q: "Government", a: "The agency through which the will of the state is expressed."},
                {q: "Social Forces", a: "External factors like religion or economy that influence behavior."},
                {q: "Public Administration", a: "The study of the implementation of government policies."},
                {q: "Comparative Politics", a: "The study and comparison of different domestic political systems."},
                {q: "International Relations", a: "The study of interactions between nation-states and organizations."},
                {q: "Social Inequality", a: "The existence of unequal opportunities for different social positions."},
                {q: "Social Change", a: "The transformation of culture and social institutions over time."},
                {q: "Sociological Perspective", a: "Understanding human behavior by placing it in a social context."},
                {q: "Political Philosophy", a: "The study of topics such as liberty, justice, and enforcement of laws."}
            ]
        },
        {
            name: "SET B: Culture",
            items: [
                {q: "Culture", a: "The 'complex whole' which encompasses beliefs, laws, and customs (E.B. Taylor)."},
                {q: "Ethnocentrism", a: "The belief that one's own culture is superior to all others."},
                {q: "Xenocentrism", a: "The belief that foreign products, styles, or ideas are superior to one's own."},
                {q: "Cultural Relativism", a: "The practice of viewing a culture by its own standards rather than judging it."},
                {q: "Xenophobia", a: "An intense or irrational dislike or fear of people from other countries."},
                {q: "Enculturation", a: "The gradual acquisition of the norms and characteristics of a culture."},
                {q: "Culture Shock", a: "Disorientation experienced when subjected to an unfamiliar way of life."},
                {q: "Material Culture", a: "The physical things created by members of a society."},
                {q: "Non-material Culture", a: "The intangible ideas created by members of a society (values, beliefs)."},
                {q: "William Graham Sumner", a: "The sociologist who coined the term 'Ethnocentrism'."},
                {q: "Norms", a: "Rules and expectations by which a society guides the behavior of its members."},
                {q: "Symbols", a: "Anything that carries a particular meaning recognized by people who share a culture."},
                {q: "Values", a: "Culturally defined standards that people use to decide what is desirable."},
                {q: "Language", a: "A system of symbols that allows people to communicate and transmit culture."},
                {q: "Functionalism", a: "The view that cultural elements work together to maintain social stability."},
                {q: "Conflict Theory", a: "The view that society is a struggle for dominance among social groups."},
                {q: "Socialization", a: "The lifelong social experience by which people develop their human potential."},
                {q: "Subculture", a: "Cultural patterns that set apart some segment of a society's population."},
                {q: "Counterculture", a: "Cultural patterns that strongly oppose those widely accepted within a society."},
                {q: "Historical Particularism", a: "The idea that each culture has its own unique and valid history."}
            ]
        },
        {
            name: "SET C: Evolution",
            items: [
                {q: "Biological Evolution", a: "Genetic changes and inherited trait variations in a population over time."},
                {q: "Charles Darwin", a: "The naturalist who introduced the theory of Natural Selection."},
                {q: "Natural Selection", a: "The process whereby organisms better adapted to their environment survive."},
                {q: "Sociocultural Evolution", a: "The development of culture from simple to complex forms."},
                {q: "Hunting and Gathering", a: "The oldest and most basic type of society; nomadic and small."},
                {q: "Horticultural Society", a: "A society that uses hand tools to raise crops."},
                {q: "Pastoral Society", a: "A society based on the domestication of animals."},
                {q: "Agricultural Society", a: "A society that uses plows and animals for large-scale farming."},
                {q: "Industrial Society", a: "A society that uses machinery and advanced energy sources for production."},
                {q: "Post-Industrial Society", a: "A society based on information, services, and high technology."},
                {q: "Paleolithic Period", a: "Known as the 'Old Stone Age' where humans were nomadic."},
                {q: "Neolithic Revolution", a: "The shift from hunting and gathering to agriculture and settlement."},
                {q: "Sumerian", a: "The civilization that developed between the Tigris and Euphrates rivers."},
                {q: "Indus Valley", a: "The ancient civilization that started along the Indus River in India."},
                {q: "Egyptian", a: "The civilization that developed along the banks of the Nile River."},
                {q: "Shang", a: "The ancient Chinese civilization that developed near the Huang Ho River."},
                {q: "Nomads", a: "People who have no permanent home and move according to food supply."},
                {q: "Information Revolution", a: "The technological shift that created the post-industrial society."},
                {q: "Civilization", a: "A complex society characterized by urban development and social hierarchy."},
                {q: "Kinship", a: "The most vital social bond in hunting and gathering societies."}
            ]
        }
    ];

    let currentSet = 0, flashIdx = 0, quizIdx = 0, score = 0, quizPool = [];

    function switchSet(idx) {
        currentSet = idx; flashIdx = 0; quizIdx = 0; score = 0;
        quizPool = [...allData[idx].items].sort(() => Math.random() - 0.5);
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
        updateFlash(); loadQuiz();
    }

    function updateFlash() {
        const item = allData[currentSet].items[flashIdx];
        document.getElementById('fcard').classList.remove('is-flipped');
        setTimeout(() => {
            document.getElementById('term-text').innerText = item.q;
            document.getElementById('def-text').innerText = item.a;
            document.getElementById('flash-count').innerText = `${flashIdx + 1} / 20`;
        }, 150);
    }

    function nextFlash() { flashIdx = (flashIdx + 1) % 20; updateFlash(); }
    function prevFlash() { flashIdx = (flashIdx - 1 + 20) % 20; updateFlash(); }

    function loadQuiz() {
        if(quizIdx >= quizPool.length) {
            document.getElementById('quiz-content').innerHTML = `<div style="text-align:center; padding:40px;"><h2>Score: ${score}/20</h2><button class="btn-nav" onclick="switchSet(${currentSet})">Retry</button></div>`;
            return;
        }
        const data = quizPool[quizIdx];
        document.getElementById('q-counter').innerText = `Question ${quizIdx + 1} of 20`;
        document.getElementById('q-text').innerText = `Define: "${data.q}"`;
        let choices = [data.a];
        while(choices.length < 4) {
            let r = allData[currentSet].items[Math.floor(Math.random()*20)].a;
            if(!choices.includes(r)) choices.push(r);
        }
        choices.sort(() => Math.random() - 0.5);
        const box = document.getElementById('options-box'); box.innerHTML = '';
        choices.forEach(c => {
            const b = document.createElement('button'); b.className = 'opt'; b.innerText = c;
            b.onclick = () => {
                const icon = document.getElementById('feedback-icon');
                if(c === data.a) { score++; b.classList.add('correct'); icon.innerText = "✓"; playSfx(true); }
                else { b.classList.add('wrong'); icon.innerText = "✗"; playSfx(false); }
                icon.classList.add('feedback-show');
                setTimeout(() => { icon.classList.remove('feedback-show'); quizIdx++; loadQuiz(); }, 1500);
            };
            box.appendChild(b);
        });
    }

    switchSet(0);
</script>
</body>
</html>
