<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCSP Ultimate Reviewer - STI Edition</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --sti-yellow: #facc15;
            --sti-blue: #38bdf8;
            --text: #f1f5f9;
            --correct: #10b981;
            --wrong: #ef4444;
        }

        body {
            font-family: 'Satoshi', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 800px; }
        h1 { color: var(--sti-yellow); text-align: center; margin-bottom: 10px; }
        .info { text-align: center; color: var(--sti-blue); margin-bottom: 30px; font-weight: 500; }

        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn {
            padding: 10px 20px;
            background: var(--card);
            border: 2px solid var(--sti-blue);
            color: var(--sti-blue);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 700;
        }
        .tab-btn.active { background: var(--sti-blue); color: var(--bg); }

        /* Flashcards Styling */
        .flashcard-section { margin-bottom: 40px; }
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .front { background: var(--card); border: 3px solid var(--sti-yellow); }
        .back { background: var(--sti-blue); color: var(--bg); transform: rotateY(180deg); font-size: 1.1rem; font-weight: 500; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .btn { padding: 10px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-nav { background: var(--card); color: white; border: 1px solid #444; }
        .btn-nav:hover { background: #334155; }

        /* Quiz Styling */
        .quiz-area {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            margin-top: 20px;
            min-height: 400px;
            position: relative;
            overflow: hidden;
            border-bottom: 6px solid var(--sti-blue);
        }
        .q-header { font-size: 0.9rem; color: var(--sti-blue); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .q-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; line-height: 1.4; }
        .options { display: grid; gap: 12px; }
        .opt {
            background: #2d3748;
            border: 2px solid #4a5568;
            color: white;
            padding: 18px;
            border-radius: 15px;
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        .opt:hover:not(:disabled) { border-color: var(--sti-yellow); background: #334155; }
        .opt.correct { background: var(--correct) !important; border-color: #059669 !important; animation: pop 0.4s ease; }
        .opt.wrong { background: var(--wrong) !important; border-color: #991b1b !important; animation: shake 0.4s ease; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .feedback-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 900;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: 0.3s;
        }
        .feedback-show { opacity: 1; transform: translate(-50%, -60%); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>UCSP Master Reviewer</h1>
    <p class="info">Modules 1, 2, & 3 • Complete 60 Items</p>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchSet(0)">Set A: Disciplines</button>
        <button class="tab-btn" onclick="switchSet(1)">Set B: Culture</button>
        <button class="tab-btn" onclick="switchSet(2)">Set C: Evolution</button>
    </div>

    <div class="flashcard-section">
        <div class="card-container" onclick="flipCard()">
            <div class="card" id="fcard">
                <div class="card-face front">
                    <span id="set-label" style="color: var(--sti-yellow); font-size: 0.8rem; margin-bottom: 15px;">SET A</span>
                    <h2 id="term-text">Loading...</h2>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 20px;">I-click para ipakita ang sagot</p>
                </div>
                <div class="card-face back" id="def-text">Definition</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn btn-nav" onclick="prevFlash()">← Nakaraan</button>
            <span id="flash-count" style="font-weight: 700;">1 / 20</span>
            <button class="btn btn-nav" onclick="nextFlash()">Susunod →</button>
        </div>
    </div>

    <div class="quiz-area">
        <div id="quiz-content">
            <div class="q-header" id="q-counter">Tanong 1</div>
            <div class="q-text" id="q-text">Loading question...</div>
            <div class="options" id="options-box"></div>
        </div>
        <div id="feedback-icon" class="feedback-overlay"></div>
    </div>
</div>

<script>
    // Sound FX Generator (Synthesized)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if(type === 'win') {
            osc.frequency.setValueAtTime(523, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(110, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        }
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    // --- DATA (60 ITEMS TOTAL) ---
    const allData = [
        {
            name: "SET A: Disciplines",
            items: [
                {q: "Anthropology", a: "Pag-aaral ng sangkatauhan sa lahat ng panahon at lugar."},
                {q: "Sociology", a: "Siyentipikong pag-aaral ng mga grupo at interaksyon sa lipunan."},
                {q: "Political Science", a: "Pag-aaral sa gobyerno, kapangyarihan (power), at mga proseso sa politika."},
                {q: "August Comte", a: "Kinikilala bilang 'Father of Sociology' na nag-coin ng term noong 1838."},
                {q: "Cultural Anthropology", a: "Sangay na nag-aaral sa pagkakaiba-iba ng kultura ng mga tao sa kasalukuyan."},
                {q: "Archaeology", a: "Pag-aaral sa mga sinaunang tao sa pamamagitan ng artifacts at material remains."},
                {q: "Biological Anthropology", a: "Nakatuon sa human origin, genetics, at ebolusyon ng katawan ng tao."},
                {q: "Linguistic Anthropology", a: "Pag-aaral kung paano nakakaapekto ang wika sa buhay at identidad ng tao."},
                {q: "State", a: "Isang political concept na binubuo ng tao, teritoryo, gobyerno, at soberanya."},
                {q: "Nation", a: "Isang ethnic concept kung saan ang mga tao ay may iisang wika, lahi, o kultura."},
                {q: "Sovereignty", d: "Ang kalayaan ng isang bansa mula sa kontrol ng ibang bansa."},
                {q: "Sovereignty", a: "Elemento ng State na tumutukoy sa supremong kapangyarihan nito."},
                {q: "Social Change", a: "Ang pagbabago sa kultura at istruktura ng lipunan sa paglipas ng panahon."},
                {q: "Public Administration", a: "Pag-aaral sa pagpapatupad ng mga polisiya ng gobyerno."},
                {q: "Comparative Politics", a: "Paghahambing sa iba't ibang sistema ng gobyerno sa buong mundo."},
                {q: "Social Forces", a: "Mga external na salik tulad ng relihiyon o ekonomiya na humuhubog sa tao."},
                {q: "Government", a: "Ang ahensya kung saan ipinapatupad ang kalooban ng isang State."},
                {q: "International Relations", a: "Pag-aaral sa ugnayan ng mga bansa at organisasyon."},
                {q: "Social Inequality", a: "Ang pagkakaroon ng hindi pantay na oportunidad sa loob ng lipunan."},
                {q: "Sociological Perspective", a: "Pagtingin sa behavior ng tao sa loob ng mas malawak na konteksto ng lipunan."},
                {q: "Political Philosophy", a: "Pag-aaral sa mga ideya tulad ng katarungan, kalayaan, at batas."}
            ]
        },
        {
            name: "SET B: Culture",
            items: [
                {q: "Culture", a: "Ang 'complex whole' na kinapapalooban ng paniniwala, batas, at tradisyon ayon kay E.B. Taylor."},
                {q: "Ethnocentrism", a: "Paniniwala na ang sariling kultura ay superior o mas mataas kaysa sa iba."},
                {q: "Xenocentrism", a: "Paniniwala na ang dayuhang kultura o produkto ay mas maganda kaysa sa sarili."},
                {q: "Cultural Relativism", a: "Pag-unawa sa isang kultura batay sa sarili nitong konteksto at hindi sa paghahambing."},
                {q: "Xenophobia", a: "Matinding takot o poot sa anumang banyaga o kakaiba."},
                {q: "Enculturation", a: "Ang unti-unting pagkuha at pag-adapt ng traits at norma ng sariling kultura."},
                {q: "Culture Shock", a: "Pakiramdam ng kalituhan o kaba sa isang hindi pamilyar na kultura."},
                {q: "Material Culture", a: "Mga nahahawakang bagay na gawa ng tao tulad ng gusali at teknolohiya."},
                {q: "Non-material Culture", a: "Mga hindi nahahawakang ideya tulad ng values, paniniwala, at norma."},
                {q: "William Graham Sumner", a: "Ang sociologist na nag-imbento ng salitang 'Ethnocentrism'."},
                {q: "Norms", a: "Mga pamantayan o inaasahang asal sa loob ng isang grupo."},
                {q: "Symbols", a: "Anumang bagay na may partikular na kahulugan sa loob ng isang kultura."},
                {q: "Values", a: "Mga basehan ng lipunan kung ano ang tama, mabuti, at kanais-nais."},
                {q: "Language", a: "Ang pangunahing instrumento sa pagpasa ng kultura sa susunod na henerasyon."},
                {q: "Functionalism", a: "Perspektiba na ang bawat bahagi ng kultura ay may mahalagang papel para sa kaayusan."},
                {q: "Conflict Theory", a: "Naniniwala na ang lipunan ay punô ng labanan sa kapangyarihan at resources."},
                {q: "Socialization", a: "Panghabang-buhay na proseso ng pagkatuto kung paano mamuhay sa lipunan."},
                {q: "Subculture", a: "Isang maliit na grupo na may sariling kultura sa loob ng mas malawak na lipunan."},
                {q: "Counterculture", a: "Kultura na kumokontra o lumalaban sa mga dominanteng norma ng lipunan."},
                {q: "Historical Particularism", a: "Paniniwala na ang bawat kultura ay may unique na kasaysayan (Franz Boas)."}
            ]
        },
        {
            name: "SET C: Evolution",
            items: [
                {q: "Biological Evolution", a: "Pagbabago sa genetics at inherited traits ng populasyon sa paglipas ng panahon."},
                {q: "Charles Darwin", d: "Naturalist na nagpakilala ng Theory of Evolution."},
                {q: "Charles Darwin", a: "Nagpakilala sa konsepto ng Natural Selection sa kanyang teorya."},
                {q: "Natural Selection", a: "Proseso kung saan ang mga 'fittest' organisms lamang ang nabubuhay."},
                {q: "Sociocultural Evolution", a: "Ang pag-unlad ng kultura mula sa simple patungong komplikadong anyo."},
                {q: "Hunting & Gathering", a: "Ang pinaka-unang uri ng lipunan; nomadic at nakadepende sa wild food."},
                {q: "Horticultural Society", a: "Lipunan na gumagamit ng simpleng kagamitang pang-kamay sa pagtatanim."},
                {q: "Pastoral Society", a: "Uri ng lipunan na nakadepende sa pag-aalaga ng mga hayop (herding)."},
                {q: "Agricultural Society", a: "Nagsimulang gumamit ng araro (plow) at permanenteng tirahan."},
                {q: "Industrial Society", a: "Lipunan na gumagamit ng mga makinarya at enerhiya para sa mass production."},
                {q: "Post-Industrial Society", a: "Lipunan na nakabase sa impormasyon, computers, at service sector."},
                {q: "Paleolithic Period", a: "Kilala bilang 'Old Stone Age' kung saan ang tao ay nomadic pa."},
                {q: "Neolithic Revolution", a: "Ang transisyon mula sa pangangaso patungo sa pagsasaka."},
                {q: "Sumerian Civilization", a: "Umusbong sa pagitan ng mga ilog Tigris at Euphrates."},
                {q: "Indus Valley Civilization", a: "Sibilisasyong umusbong sa tabi ng Indus River sa India."},
                {q: "Egyptian Civilization", a: "Sibilisasyong nabuo sa tabi ng Nile River."},
                {q: "Shang Civilization", a: "Sinaunang sibilisasyon ng China sa tabi ng Huang Ho River."},
                {q: "Nomads", a: "Mga taong walang permanenteng tirahan at palipat-lipat para sa pagkain."},
                {q: "Information Revolution", a: "Ang nagtulak sa pagpasok ng Post-Industrial era."},
                {q: "Civilization", a: "Isang mataas na lebel ng kultura na may organisadong gobyerno at sining."},
                {q: "Kinship", a: "Ang pinaka-mahalagang bond o ugnayan sa Hunting & Gathering society."}
            ]
        }
    ];

    let currentSet = 0;
    let flashIdx = 0;
    let quizIdx = 0;
    let score = 0;
    let quizPool = [];

    // --- CORE LOGIC ---

    function flipCard() { document.getElementById('fcard').classList.toggle('is-flipped'); }

    function switchSet(idx) {
        currentSet = idx;
        flashIdx = 0;
        quizIdx = 0;
        score = 0;
        
        // Prepare Quiz Pool (Shuffle items from this set)
        quizPool = [...allData[currentSet].items].sort(() => Math.random() - 0.5);

        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
        document.getElementById('set-label').innerText = allData[idx].name.split(':')[0];
        
        updateFlash();
        loadQuiz();
    }

    function updateFlash() {
        const item = allData[currentSet].items[flashIdx];
        const fcard = document.getElementById('fcard');
        fcard.classList.remove('is-flipped');
        setTimeout(() => {
            document.getElementById('term-text').innerText = item.q;
            document.getElementById('def-text').innerText = item.a;
            document.getElementById('flash-count').innerText = `${flashIdx + 1} / ${allData[currentSet].items.length}`;
        }, 150);
    }

    function nextFlash() { flashIdx = (flashIdx + 1) % allData[currentSet].items.length; updateFlash(); }
    function prevFlash() { flashIdx = (flashIdx - 1 + allData[currentSet].items.length) % allData[currentSet].items.length; updateFlash(); }

    function loadQuiz() {
        if(quizIdx >= quizPool.length) {
            document.getElementById('quiz-content').innerHTML = `
                <div style="text-align:center; padding: 40px;">
                    <h2 style="color:var(--sti-yellow)">Tapos na ang Quiz!</h2>
                    <p style="font-size: 1.5rem">Score: ${score} / ${quizPool.length}</p>
                    <button class="btn btn-nav" onclick="switchSet(${currentSet})" style="margin-top:20px">Ulitin ang Set</button>
                </div>`;
            return;
        }

        const data = quizPool[quizIdx];
        document.getElementById('q-counter').innerText = `Tanong ${quizIdx + 1} ng ${quizPool.length}`;
        document.getElementById('q-text').innerText = `Ano ang tawag o kahulugan ng: "${data.q === data.a ? data.q : data.q}"?`;
        
        // Generate Options
        let choices = [data.a];
        while(choices.length < 4) {
            let randomItem = allData[currentSet].items[Math.floor(Math.random() * allData[currentSet].items.length)].a;
            if(!choices.includes(randomItem)) choices.push(randomItem);
        }
        choices.sort(() => Math.random() - 0.5);

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        choices.forEach(c => {
            const b = document.createElement('button');
            b.className = 'opt';
            b.innerText = c;
            b.onclick = () => checkAnswer(c, data.a, b);
            box.appendChild(b);
        });
    }

    function checkAnswer(selected, correct, btn) {
        const opts = document.querySelectorAll('.opt');
        opts.forEach(o => o.disabled = true);
        const icon = document.getElementById('feedback-icon');

        if(selected === correct) {
            score++;
            btn.classList.add('correct');
            icon.innerText = "✓";
            icon.style.color = "var(--correct)";
            playSfx('win');
        } else {
            btn.classList.add('wrong');
            opts.forEach(o => { if(o.innerText === correct) o.classList.add('correct'); });
            icon.innerText = "✗";
            icon.style.color = "var(--wrong)";
            playSfx('lose');
        }

        icon.classList.add('feedback-show');

        // Auto-advance
        setTimeout(() => {
            icon.classList.remove('feedback-show');
            quizIdx++;
            loadQuiz();
        }, 1500);
    }

    // Init
    switchSet(0);
</script>

</body>
</html>
